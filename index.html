<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucide Test Local</title>

<!-- UMD version of Lucide (works on local files) -->
<script src="https://cdn.jsdelivr.net/npm/lucide/dist/lucide.js"></script>

</head>
<body>

<h1>Lucide Icon Test</h1>

<i data-lucide="home" width="48" height="48"></i>
<i data-lucide="code" width="48" height="48"></i>
<i data-lucide="smartphone" width="48" height="48"></i>

<script>
  // Activate icons
  lucide.createIcons();
</script>

</body>
</html>
